<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <rect width="1200" height="750" fill="#edf2f7"/>
  <rect x="40" y="40" width="1120" height="670" rx="20" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
  <text x="80" y="100" fill="#0f172a" font-size="44" font-family="Arial, sans-serif" font-weight="700">Analytical Grid Report</text>

  <g transform="translate(80,130)">
    <rect x="0" y="0" width="500" height="250" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="50" x2="500" y2="50" stroke="#cbd5e1"/>
    <line x1="0" y1="100" x2="500" y2="100" stroke="#cbd5e1"/>
    <line x1="0" y1="150" x2="500" y2="150" stroke="#cbd5e1"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="#cbd5e1"/>
    <line x1="100" y1="0" x2="100" y2="250" stroke="#cbd5e1"/>
    <line x1="200" y1="0" x2="200" y2="250" stroke="#cbd5e1"/>
    <line x1="300" y1="0" x2="300" y2="250" stroke="#cbd5e1"/>
    <line x1="400" y1="0" x2="400" y2="250" stroke="#cbd5e1"/>
    <polyline points="40,210 120,160 200,175 280,120 360,140 440,85" fill="none" stroke="#2563eb" stroke-width="5"/>
  </g>

  <g transform="translate(620,130)">
    <rect x="0" y="0" width="500" height="250" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <rect x="30" y="180" width="50" height="40" fill="#93c5fd"/>
    <rect x="100" y="140" width="50" height="80" fill="#60a5fa"/>
    <rect x="170" y="120" width="50" height="100" fill="#3b82f6"/>
    <rect x="240" y="90" width="50" height="130" fill="#2563eb"/>
    <rect x="310" y="70" width="50" height="150" fill="#1d4ed8"/>
    <rect x="380" y="45" width="50" height="175" fill="#1e40af"/>
  </g>

  <g transform="translate(80,420)">
    <rect x="0" y="0" width="1040" height="240" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="30" y="60" fill="#1e293b" font-size="32" font-family="Arial, sans-serif">Structured metrics, trend lines, and process annotations</text>
    <text x="30" y="110" fill="#334155" font-size="24" font-family="Arial, sans-serif">• Technical grid alignment  • Analytical overlays  • Professional reporting format</text>
    <text x="30" y="160" fill="#475569" font-size="22" font-family="Arial, sans-serif">Local SVG asset (non-binary) for compatibility with PR pipeline.</text>
  </g>
