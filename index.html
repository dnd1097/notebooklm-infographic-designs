<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NotebookLM Infographic Styles</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <h1>Infographic Style Library</h1>
    <div class="header-controls">
      <input id="search" placeholder="Search styles..." />
      <button id="reloadLibrary">Reload Library</button>
    </div>
  </header>

  <div class="library-shell">
    <aside class="tag-sidebar">
      <div class="sidebar-header">
        <h2>Hashtags</h2>
      </div>
      <div id="filters"></div>
    </aside>

    <main class="library-main">
      <div id="stats"></div>
      <div id="categories"></div>
      <div id="grid"></div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
